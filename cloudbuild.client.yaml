steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.client
      - --build-arg
      - NG_CONFIGURATION=${_NG_CONFIGURATION}
      - --build-arg
      - API_BASE_URL=${_API_BASE_URL}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_CLIENT_IMAGE}:latest
      - .

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_CLIENT_IMAGE}:latest

substitutions:
  _REGION: asia-east1
  _REPOSITORY: social-platform
  _CLIENT_IMAGE: social-platform-client
  _NG_CONFIGURATION: production
  _API_BASE_URL: https://api.example.com

options:
  logging: CLOUD_LOGGING_ONLY

