services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: social_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/social_platform
      CORS_ORIGIN: http://127.0.0.1:4201
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        NG_CONFIGURATION: production
        API_BASE_URL: http://127.0.0.1:3001
    ports:
      - "4201:80"
    depends_on:
      - server

volumes:
  postgres_data:
